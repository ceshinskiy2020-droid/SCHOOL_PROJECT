<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Завершение сеанса</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .session-info {
            font-size: 1.1em;
            margin: 20px 0;
            padding: 10px;
            background: #f8f9fa;
            border-left: 4px solid #007BFF;
        }
        button {
            padding: 10px 20px;
            background: #dc3545;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover { background: #c82333; }
        .logout-btn {
            background: #6c757d;
            margin-left: 10px;
        }
        .logout-btn:hover { background: #545b62; }

        .feedback-section {
            margin-top: 30px;
            padding: 20px;
            background: #f0f8ff;
            border-radius: 8px;
        }

        .rating {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }

        .rating input {
            display: none;
        }

        .rating label {
            font-size: 24px;
            color: #ddd;
            cursor: pointer;
        }

        .rating input:checked ~ label,
        .rating input:hover ~ label,
        .rating input:focus ~ label {
            color: #ffcc00;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            margin-top: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
        }

        .submit-btn {
            margin-top: 15px;
            padding: 12px 24px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        .submit-btn:hover {
            background: #218837;
        }
    </style>
</head>
<body>
    <h1>Сеанс активен</h1>

    <p>Нажмите кнопку ниже, чтобы завершить сеанс.</p>

    <form action="{{ url_for('end_session') }}" method="POST" style="display:inline;">
        <button type="submit">Закончить сеанс</button>
    </form>

    <!-- Форма обратной связи -->
    <div class="feedback-section">
        <h3>Оцените сеанс и оставьте отзыв</h3>
        <form action="{{ url_for('submit_feedback') }}" method="POST">
            <!-- Звёзды (оценка 1–5) -->
            <div class="rating">
                <input type="radio" id="star5" name="rating" value="5" required>
                <label for="star5">★</label>

                <input type="radio" id="star4" name="rating" value="4">
                <label for="star4">★</label>

                <input type="radio" id="star3" name="rating" value="3">
                <label for="star3">★</label>

                <input type="radio" id="star2" name="rating" value="2">
                <label for="star2">★</label>

                <input type="radio" id="star1" name="rating" value="1">
                <label for="star1">★</label>
            </div>

            <!-- Поле для текста -->
            <textarea name="feedback" placeholder="Расскажите, что вам понравилось или что можно улучшить..."></textarea>

            <button type="submit" class="submit-btn">Отправить отзыв</button>
        </form>
    </div>

</body>
</html>
